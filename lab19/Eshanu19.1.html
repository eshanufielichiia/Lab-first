<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра "Знайди збіг"</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-container {
            text-align: center;
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .game-title { font-size: 48px; color: #333; margin-bottom: 40px; }
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 15px 40px; font-size: 24px;
            border-radius: 50px; cursor: pointer; transition: transform 0.3s;
        }
        .btn-start:hover { transform: scale(1.05); }
        .game-container {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 1000px; width: 100%;
        }
        .category-buttons {
            display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap;
        }
        .btn-category {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 12px 30px; font-size: 18px;
            border-radius: 50px; cursor: pointer; transition: all 0.3s;
        }
        .btn-category:hover { transform: translateY(-2px); }
        .game-layout {
            display: flex; gap: 50px; justify-content: center; align-items: center;
            margin: 30px 0; flex-wrap: wrap;
        }
        .grid-4x4 {
            display: grid; grid-template-columns: repeat(4, 90px); gap: 12px;
            justify-content: center; margin-top: 15px;
        }
        .grid-cell {
            width: 90px; height: 90px; border: 3px solid #ddd; border-radius: 12px;
            background: #f9f9f9; transition: all 0.3s; display: flex;
            align-items: center; justify-content: center; font-size: 48px; cursor: pointer;
        }
        .grid-cell.drag-over {
            border-color: #4CAF50; background: #e8f5e9; transform: scale(1.02);
        }
        .current-image {
            width: 180px; height: 180px; border: 4px solid #667eea; border-radius: 20px;
            margin: 15px auto; background: #f0f0f0; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            font-size: 90px; cursor: grab;
        }
        .current-image[draggable="true"] { cursor: grab; }
        .current-image[draggable="true"]:active { cursor: grabbing; }
        .game-controls { text-align: center; margin-top: 30px; }
        .btn-restart {
            background: #ff6b6b; color: white; border: none; padding: 12px 30px;
            font-size: 18px; border-radius: 50px; cursor: pointer; transition: all 0.3s;
        }
        .btn-restart:hover { background: #ff5252; transform: scale(1.05); }
        .score-counter {
            text-align: center; margin-top: 20px; padding: 10px;
            background: #f0f0f0; border-radius: 10px; font-size: 20px;
            font-weight: bold; color: #333;
        }
        .hint { color: #888; font-size: 14px; margin-top: 10px; }
        h2, h3 { color: #333; margin-bottom: 15px; }
        .hidden { display: none; }
        @media (max-width: 768px) {
            .grid-4x4 { grid-template-columns: repeat(4, 60px); gap: 8px; }
            .grid-cell { width: 60px; height: 60px; font-size: 32px; }
            .current-image { width: 120px; height: 120px; font-size: 60px; }
            .game-title { font-size: 32px; }
            .main-container { padding: 40px 50px; }
        }
    </style>
</head>
<body>
<div id="mainPage" class="main-container">
    <h1 class="game-title">🐾 ЗНАЙДИ ЗБІГ 🎯</h1>
    <button id="startGameBtn" class="btn-start">Почати гру</button>
</div>
<div id="gamePage" class="game-container hidden">
    <h2 id="categoryTitle">Виберіть категорію</h2>
    <div class="category-buttons" id="categoryButtons">
        <button class="btn-category" data-category="animals">🐘 Тварини</button>
        <button class="btn-category" data-category="insects">🐞 Комахи</button>
        <button class="btn-category" data-category="fish">🐟 Риби</button>
    </div>
    <div id="gameArea" class="hidden">
        <div class="game-layout">
            <div class="game-field">
                <h3>🎮 Поле гри (4x4)</h3>
                <div id="gameGrid" class="grid-4x4"></div>
            </div>
            <div class="current-card">
                <h3>🃏 Поточна картинка</h3>
                <div id="currentImage" class="current-image" draggable="true"></div>
                <p class="hint">💡 Перетягніть на співпадаючу картинку</p>
            </div>
        </div>
        <div class="game-controls">
            <button id="restartGameBtn" class="btn-restart">🔄 Почати з початку</button>
        </div>
    </div>
    <div id="scoreCounter" class="score-counter hidden">🏆 Збігів: <span id="matchCount">0</span> / 16</div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<script>
$(document).ready(function() {
    const categoryData = {
        animals: { emojis: ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🐴","🐺","🐗","🦝","🦙","🦒","🦓","🦌","🐘","🦏","🦛","🐪","🦘","🦥","🐬","🦈","🐋","🦭"] },
        insects: { emojis: ["🐝","🦋","🐞","🐜","🦟","🕷️","🦗","🐛","🐌","🪲","🪳","🪰","🪱","🦂"] },
        fish: { emojis: ["🐠","🐟","🐡","🦀","🦐","🦑","🐙","🐬","🐳","🐋","🦈","🧜‍♀️","🧜‍♂️","🌊"] }
    };
    for(let cat in categoryData) {
        let e = categoryData[cat].emojis;
        while(e.length<50) e.push(...e.slice(0,10));
        e.length=50;
        categoryData[cat].emojis = [...new Set(e)];
    }
    let currentCategory='', allEmojis=[], currentGridEmojis=[], matchedCount=0, isGameActive=false, currentDragEmoji='';
    const GRID_SIZE=16;
    function getUniqueRandomEmojis(count, src) {
        let s=[...src];
        for(let i=s.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}
        return s.slice(0,count);
    }
    function getNewUniqueEmoji(exSet, src) {
        let avail = src.filter(e=>!exSet.has(e));
        if(avail.length) return avail[Math.floor(Math.random()*avail.length)];
        return src[Math.floor(Math.random()*src.length)];
    }
    $('#startGameBtn').click(()=>{$('#mainPage').addClass('hidden');$('#gamePage').removeClass('hidden');});
    $('.btn-category').click(function(){
        currentCategory=$(this).data('category');
        $('#categoryTitle').text(`🎯 Гра: ${$(this).text()}`);
        allEmojis=[...categoryData[currentCategory].emojis];
        $('#categoryButtons').addClass('hidden');
        $('#gameArea,#scoreCounter').removeClass('hidden');
        startNewGame();
    });
    function startNewGame(){ matchedCount=0; isGameActive=true; $('#matchCount').text(matchedCount); generateGameGridAndCurrent(); }
    function generateGameGridAndCurrent(){
        let grid=$('#gameGrid'); grid.empty();
        currentGridEmojis=getUniqueRandomEmojis(GRID_SIZE, allEmojis);
        let gridSet=new Set(currentGridEmojis);
        let avail=allEmojis.filter(e=>!gridSet.has(e));
        if(!avail.length) avail=[...allEmojis];
        currentDragEmoji=avail[Math.floor(Math.random()*avail.length)];
        for(let i=0;i<GRID_SIZE;i++) $('<div>').addClass('grid-cell').attr('data-index',i).text(currentGridEmojis[i]).appendTo(grid);
        $('#currentImage').empty().text(currentDragEmoji);
        setupDragAndDrop(); setupDraggable();
    }
    function updateCellAfterMatch(idx,el){
        let exSet=new Set();
        for(let i=0;i<GRID_SIZE;i++) if(i!==idx) exSet.add(currentGridEmojis[i]);
        let newEmoji=getNewUniqueEmoji(exSet,allEmojis);
        currentGridEmojis[idx]=newEmoji; el.text(newEmoji);
        let curSet=new Set(currentGridEmojis);
        let avail=allEmojis.filter(e=>!curSet.has(e));
        if(!avail.length) avail=[...allEmojis];
        currentDragEmoji=avail[Math.floor(Math.random()*avail.length)];
        $('#currentImage').empty().text(currentDragEmoji);
        setupDraggable();
    }
    function setupDragAndDrop(){
        $('.grid-cell').each(function(){
            let c=$(this);
            c.off('dragenter').on('dragenter',function(e){e.preventDefault();$(this).addClass('drag-over');});
            c.off('dragover').on('dragover',function(e){e.preventDefault();$(this).addClass('drag-over');});
            c.off('dragleave').on('dragleave',function(e){e.preventDefault();$(this).removeClass('drag-over');});
            c.off('drop').on('drop',function(e){
                e.preventDefault(); $(this).removeClass('drag-over');
                if(!isGameActive) return;
                let idx=$(this).data('index');
                if(currentDragEmoji===currentGridEmojis[idx]){
                    matchedCount++; $('#matchCount').text(matchedCount);
                    updateCellAfterMatch(idx,$(this));
                    if(matchedCount>=GRID_SIZE) finishGame();
                }
            });
        });
    }
    function setupDraggable(){
        let d=$('#currentImage');
        d.attr('draggable','true');
        d.off('dragstart').on('dragstart',function(e){
            if(!isGameActive){e.preventDefault();return false;}
            e.originalEvent.dataTransfer.setData('text/plain',currentDragEmoji);
            e.originalEvent.dataTransfer.effectAllowed='copy';
            $(this).css('opacity','0.5');
        });
        d.off('dragend').on('dragend',function(){$(this).css('opacity','1');});
    }
    function finishGame(){
        isGameActive=false;
        $('<div>').dialog({title:'🎉 ВІТАННЯ! 🎉',open:function(){$(this).html(`<div style="text-align:center;padding:20px;"><div style="font-size:48px;">🎊</div><p style="font-size:20px;font-weight:bold;color:#4CAF50;">Вітаю!</p><p>Ви знайшли всі ${GRID_SIZE} збігів!</p><p style="color:#888;">Гра почнеться з початку</p></div>`);},buttons:{'Грати знову':function(){$(this).dialog('close');startNewGame();}},modal:true,width:400,close:function(){startNewGame();}});
    }
    $('#restartGameBtn').click(()=>{if(confirm('Ви впевнені?')) startNewGame();});
});
</script>
</body>
</html>
