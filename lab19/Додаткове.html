<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гра "Знайди збіг"</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-container, .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 1000px;
            width: 100%;
        }
        .main-container { max-width: 500px; }
        h1 { font-size: 42px; margin-bottom: 20px; }
        .btn-start, .btn-category, .btn-restart {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-start { font-size: 24px; padding: 15px 40px; }
        .btn-restart { background: #ff6b6b; }
        .stats-panel { margin-top: 30px; padding: 15px; background: #f0f0f0; border-radius: 15px; }
        .stat-card { display: inline-block; background: white; padding: 10px 20px; margin: 5px; border-radius: 10px; }
        .stat-value { font-size: 28px; font-weight: bold; color: #667eea; }
        .grid-4x4 { display: grid; grid-template-columns: repeat(4, 85px); gap: 10px; justify-content: center; margin: 20px 0; }
        .grid-cell {
            width: 85px; height: 85px; border: 3px solid #ddd; border-radius: 12px;
            background: #f9f9f9; display: flex; align-items: center; justify-content: center;
            font-size: 42px; transition: 0.2s;
        }
        .grid-cell.drag-over { border-color: #4CAF50; background: #e8f5e9; transform: scale(1.02); }
        .current-image {
            width: 160px; height: 160px; border: 4px solid #667eea; border-radius: 20px;
            margin: 15px auto; background: #f0f0f0; display: flex; align-items: center;
            justify-content: center; font-size: 80px; cursor: grab;
        }
        .current-image:active { cursor: grabbing; }
        .score-counter { margin: 20px; padding: 10px; background: #f0f0f0; border-radius: 10px; font-size: 20px; font-weight: bold; }
        .hidden { display: none; }
        .back-link { margin-top: 15px; display: inline-block; color: #667eea; cursor: pointer; }
        h2, h3 { margin-bottom: 15px; color: #333; }
        .flex-row { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; align-items: center; }
    </style>
</head>
<body>

<div id="mainPage" class="main-container">
    <h1>🐾 ЗНАЙДИ ЗБІГ 🎯</h1>
    <button id="startGameBtn" class="btn-start">Почати гру</button>
    <div class="stats-panel">
        <h3>📊 Статистика</h3>
        <div class="stat-card"><div class="stat-value" id="totalGames">0</div><div>Ігор</div></div>
        <div class="stat-card"><div class="stat-value" id="totalMatches">0</div><div>Збігів</div></div>
        <div class="stat-card"><div class="stat-value" id="bestScore">0</div><div>Рекорд</div></div>
    </div>
</div>

<div id="gamePage" class="game-container hidden">
    <h2 id="categoryTitle">Виберіть категорію</h2>
    <div id="categoryButtons">
        <button class="btn-category" data-cat="animals">🐘 Тварини</button>
        <button class="btn-category" data-cat="insects">🐞 Комахи</button>
        <button class="btn-category" data-cat="fish">🐟 Риби</button>
    </div>
    <div id="gameArea" class="hidden">
        <div class="flex-row">
            <div>
                <h3>🎮 Поле гри (4x4)</h3>
                <div id="gameGrid" class="grid-4x4"></div>
            </div>
            <div>
                <h3>🃏 Поточна картинка</h3>
                <div id="currentImage" class="current-image" draggable="true"></div>
                <p>💡 Перетягніть на таку саму</p>
            </div>
        </div>
        <button id="restartBtn" class="btn-restart">🔄 Почати з початку</button>
    </div>
    <div id="scoreCounter" class="score-counter hidden">🏆 Збігів: <span id="matchCount">0</span> / 16</div>
    <a id="backBtn" class="back-link">← На головну</a>
</div>

<script>
    const EMOJIS = {
        animals: ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🐴","🐺","🐗","🦝","🦙","🦒","🦓","🦌","🐘","🦏","🦛","🐪","🦘","🦥","🐬","🦈","🐋","🦭"],
        insects: ["🐝","🦋","🐞","🐜","🦟","🕷️","🦗","🐛","🐌","🪲","🪳","🪰","🪱","🦂"],
        fish: ["🐠","🐟","🐡","🦀","🦐","🦑","🐙","🐬","🐳","🐋","🦈","🧜‍♀️","🧜‍♂️","🌊"]
    };
    for(let cat in EMOJIS) {
        let arr = EMOJIS[cat];
        while(arr.length < 50) arr.push(...arr.slice(0,10));
        EMOJIS[cat] = [...new Set(arr)];
    }

    let currentList = [];      
    let gridItems = [];        
    let currentEmoji = '';     
    let matches = 0;           
    let gameActive = false;    

    async function loadStats() {
        try {
            let res = await fetch('/api/stats');
            let data = await res.json();
            document.getElementById('totalGames').innerText = data.totalGames;
            document.getElementById('totalMatches').innerText = data.totalMatches;
            document.getElementById('bestScore').innerText = data.bestScore;
        } catch(e) {}
    }

    async function saveStats(matches) {
        try {
            await fetch('/api/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ matches: matches })
            });
            loadStats();
        } catch(e) {}
    }

    function shuffle(arr) {
        for(let i = arr.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getUniqueRandomEmojis(count, sourceArray) {
        let shuffled = shuffle([...sourceArray]);
        return shuffled.slice(0, count);
    }

    function getNewUniqueEmoji(existingSet, sourceArray) {
        let available = sourceArray.filter(e => !existingSet.has(e));
        if(available.length > 0) {
            return available[Math.floor(Math.random() * available.length)];
        }
        return sourceArray[Math.floor(Math.random() * sourceArray.length)];
    }

    function startNewGame() {
        matches = 0;
        gameActive = true;
        document.getElementById('matchCount').innerText = matches;

        gridItems = getUniqueRandomEmojis(16, currentList);

        let randomIndex = Math.floor(Math.random() * gridItems.length);
        currentEmoji = gridItems[randomIndex];

        let grid = document.getElementById('gameGrid');
        grid.innerHTML = '';
        for(let i = 0; i < 16; i++) {
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.setAttribute('data-index', i);
            cell.innerText = gridItems[i];
            
            cell.ondragenter = (e) => { e.preventDefault(); cell.classList.add('drag-over'); };
            cell.ondragover = (e) => { e.preventDefault(); cell.classList.add('drag-over'); };
            cell.ondragleave = () => { cell.classList.remove('drag-over'); };
            cell.ondrop = (e) => {
                e.preventDefault();
                cell.classList.remove('drag-over');
                if(!gameActive) return;
                
                let idx = parseInt(cell.dataset.index);
                let droppedEmoji = e.dataTransfer.getData('text/plain');

                if(droppedEmoji === gridItems[idx]) {
                    matches++;
                    document.getElementById('matchCount').innerText = matches;

                    let existingSet = new Set();
                    for(let j = 0; j < 16; j++) {
                        if(j !== idx) existingSet.add(gridItems[j]);
                    }

                    let newEmoji = getNewUniqueEmoji(existingSet, currentList);
                    gridItems[idx] = newEmoji;
                    cell.innerText = newEmoji;

                    let newRandomIndex = Math.floor(Math.random() * gridItems.length);
                    currentEmoji = gridItems[newRandomIndex];
                    document.getElementById('currentImage').innerText = currentEmoji;

                    if(matches >= 16) {
                        gameActive = false;
                        saveStats(matches);
                        alert('🎉 ВІТАННЯ! Ви знайшли всі 16 збігів!');
                        startNewGame();
                    }
                }
            };
            grid.appendChild(cell);
        }

        let currentDiv = document.getElementById('currentImage');
        currentDiv.innerText = currentEmoji;
        currentDiv.ondragstart = (e) => {
            if(!gameActive) { e.preventDefault(); return false; }
            e.dataTransfer.setData('text/plain', currentEmoji);
            currentDiv.style.opacity = '0.5';
        };
        currentDiv.ondragend = () => { currentDiv.style.opacity = '1'; };
    }

    document.getElementById('startGameBtn').onclick = () => {
        document.getElementById('mainPage').classList.add('hidden');
        document.getElementById('gamePage').classList.remove('hidden');
    };
    
    document.getElementById('backBtn').onclick = () => {
        document.getElementById('gamePage').classList.add('hidden');
        document.getElementById('mainPage').classList.remove('hidden');
        loadStats();
    };
    
    document.getElementById('restartBtn').onclick = () => {
        if(confirm('Почати гру з початку?')) startNewGame();
    };

    document.querySelectorAll('.btn-category').forEach(btn => {
        btn.onclick = () => {
            let cat = btn.dataset.cat;
            document.getElementById('categoryTitle').innerText = '🎯 Гра: ' + btn.innerText;
            currentList = [...EMOJIS[cat]];
            document.getElementById('categoryButtons').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('scoreCounter').classList.remove('hidden');
            startNewGame();
        };
    });
    
    loadStats();
</script>
</body>
</html>
