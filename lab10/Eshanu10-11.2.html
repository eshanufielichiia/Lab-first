<html>
<head>
    <meta charset="UTF-8">
    <title>Анкета користувача</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 40px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        h2 {
            color: #1e3c72;
            text-align: center;
            border-bottom: 3px solid #ffd700;
            padding-bottom: 10px;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: inline-block;
            width: 200px;
            font-weight: bold;
        }
        .inline-label {
            width: auto;
            font-weight: normal;
        }
        input, select, textarea {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 250px;
        }
        .radio-group, .checkbox-group {
            display: inline-block;
        }
        .radio-group label, .checkbox-group label {
            width: auto;
            font-weight: normal;
            margin-right: 20px;
        }
        .buttons {
            margin-top: 30px;
            text-align: center;
        }
        .buttons input {
            padding: 12px 25px;
            margin: 0 15px;
            cursor: pointer;
            font-size: 16px;
            border: none;
            border-radius: 8px;
        }
        input[type="submit"] {
            background: #1e3c72;
            color: white;
        }
        input[type="reset"] {
            background: #e74c3c;
            color: white;
        }
        hr {
            margin: 20px 0;
        }
        .note {
            font-size: 12px;
            color: #999;
            margin-left: 210px;
        }
    </style>
    <script>
        function showMessage() {
            alert("✅ Ваша анкета прийнята до обробки. Дякуємо за увагу!");
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>📝 АНКЕТА КОРИСТУВАЧА</h2>
        <form onsubmit="showMessage(); return false;">
        
            <div class="form-group">
                <label>Прізвище:</label>
                <input type="text" name="surname" size="30" maxlength="40" placeholder="Введіть прізвище">
            </div>

            <div class="form-group">
                <label> Ім'я:</label>
                <input type="text" name="name" size="30" maxlength="40" placeholder="Введіть ім'я">
            </div>

            <div class="form-group">
                <label>По батькові:</label>
                <input type="text" name="patronymic" size="30" maxlength="40" placeholder="Введіть по батькові">
            </div>

            <div class="form-group">
                <label>Пароль:</label>
                <input type="password" name="password" size="20" maxlength="20" placeholder="Введіть пароль">
            </div>

            <div class="form-group">
                <label>Стать:</label>
                <div class="radio-group">
                    <input type="radio" name="gender" value="male" checked> Чоловіча
                    <input type="radio" name="gender" value="female"> Жіноча
                </div>
            </div>

            <div class="form-group">
                <label>🎓 Курс навчання:</label>
                <select name="course">
                    <option value="1">Перший курс</option>
                    <option value="2">Другий курс</option>
                    <option value="3" selected>Третій курс</option>
                    <option value="4">Четвертий курс</option>
                    <option value="5">П'ятий курс</option>
                </select>
            </div>

            <div class="form-group">
                <label>Дисципліни:</label>
                <select name="subjects" size="4" multiple style="width: 250px;">
                    <option value="web" selected>Web-програмування</option>
                    <option value="electrodynamics">Технічна електродинаміка</option>
                    <option value="math">Вища математика</option>
                    <option value="physics">Фізика</option>
                    <option value="english">Англійська мова</option>
                </select>
                <div class="note">(Для вибору кількох пунктів затисніть Ctrl)</div>
            </div>

            <div class="form-group">
                <label>Додаткові навички:</label>
                <div class="checkbox-group">
                    <input type="checkbox" name="skills" value="html" checked> HTML/CSS
                    <input type="checkbox" name="skills" value="js"> JavaScript
                    <input type="checkbox" name="skills" value="python"> Python
                    <input type="checkbox" name="skills" value="sql"> SQL
                </div>
            </div>

            <div class="form-group">
                <label>Досвід роботи:</label>
                <div class="radio-group">
                    <input type="radio" name="experience" value="0"> Немає
                    <input type="radio" name="experience" value="1"> до 1 року
                    <input type="radio" name="experience" value="2" checked> 1-3 роки
                    <input type="radio" name="experience" value="3"> більше 3 років
                </div>
            </div>

            <div class="form-group">
                <label>Про себе:</label>
                <textarea name="about" rows="5" cols="45" placeholder="Розкажіть про себе, ваші досягнення, хобі, цілі..."></textarea>
            </div>
            
            <div class="form-group">
                <label> Ваше фото:</label>
                <input type="file" name="photo" accept="image/*">
            </div>
            
            <hr>
            
            <div class="buttons">
                <input type="submit" value="✅ Відправити анкету">
                <input type="reset" value="🗑️ Очистити форму">
            </div>
        </form>
    </div>
</body>
</html>
