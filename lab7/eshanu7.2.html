<html>
<head>
    <meta charset="UTF-8">
    <title>Завдання 2 - Список з малюнками-маркерами</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #134e5e 0%, #71b280 100%);
            padding: 40px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #f0fff4;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid #2d6a4f;
        }
        h1 {
            color: #1b4332;
            text-align: center;
            border-bottom: 3px solid #40916c;
            padding-bottom: 10px;
        }
        h3 {
            color: #2d6a4f;
            margin-top: 20px;
            text-align: center;
        }
        .schedule {
            list-style: none;
            padding-left: 0;
        }
        .schedule li {
            padding: 12px 0;
            border-bottom: 1px solid #c8e6d9;
            font-size: 18px;
            color: #1b4332;
        }
        .marker {
            font-size: 24px;
            margin-right: 15px;
            display: inline-block;
            width: 35px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ГРАФІК РОБОТИ</h1>
        <h3>Магазин "Зелений Сад"</h3>
        
        <ul class="schedule" style="list-style: none;">
            <li><span class="marker">🌿</span> Понеділок &nbsp;&nbsp; 9:00 - 18:00</li>
            <li><span class="marker">🌿</span> Вівторок &nbsp;&nbsp;&nbsp; 9:00 - 18:00</li>
            <li><span class="marker">🌿</span> Середа &nbsp;&nbsp;&nbsp; 9:00 - 18:00</li>
            <li><span class="marker">🌿</span> Четвер &nbsp;&nbsp;&nbsp; 9:00 - 18:00</li>
            <li><span class="marker">🌿</span> П'ятниця &nbsp;&nbsp; 9:00 - 17:00</li>
            <li><span class="marker">🌿</span> Субота &nbsp;&nbsp;&nbsp;&nbsp; 9:00 - 14:00</li>
            <li><span class="marker">🌿</span> Неділя &nbsp;&nbsp;&nbsp; Вихідний день 🌟</li>
        </ul>
    </div>
</body>
</html>
