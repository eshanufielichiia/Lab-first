<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Завдання 5 - Спеціальності</title>
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #9cc5e0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        table {
            margin: 60px auto;
            border: 4px solid #f39c12;
            background-color: #ecf0f1;
            width: 75%;
            border-collapse: collapse;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        td {
            border: 2px solid #6a8cb2;
            padding: 14px;
            text-align: center;
            vertical-align: middle;
            background-color: #fff;
            font-size: 15px;
        }
        .empty-cell {
            background-color: #bdc3c7;
            font-weight: bold;
        }
        .title-cell {
            background-color: #e67e22;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .specialty-main {
            background-color: #266995;
            color: white;
            font-weight: bold;
            font-size: 18px;
            writing-mode: horizontal-tb;
        }
        .label-cell {
            background-color: #f1c40f;
            font-weight: bold;
        }
        .good-result {
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
        }
        .mid-result {
            background-color: #f39c12;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td rowspan="2" class="empty-cell" width="10%"></td>
            <td rowspan="2" class="empty-cell" width="10%"></td>
            <td colspan="2" class="title-cell" width="40%">Характеристики спеціальностей</td>
        </tr>
      
        <tr>
            <td class="label-cell">Кількість студентів</td>
            <td class="label-cell">Якість успішності</td>
        </tr>
     
        <tr>
            <td rowspan="3" class="specialty-main" width="20%">
                🎓<br>
                СПЕЦІАЛЬНІСТЬ
            </td>
            <td align="left">Комп'ютерна інженерія</td>
            <td>250</td>
            <td class="good-result">80%</td>
        </tr>
     
        <tr>
            <td align="left">Телекомунікації та радіотехніка</td>
            <td>200</td>
            <td class="mid-result">75%</td>
        </tr>
    
        <tr>
            <td align="left">Електромеханіка</td>
            <td>150</td>
            <td class="good-result">85%</td>
        </tr>
    </table>

</body>
</html>
