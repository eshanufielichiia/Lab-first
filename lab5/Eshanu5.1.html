<html>
<head>
    <meta charset="UTF-8">
    <title>Завдання 1 - Таблиця</title>
    <style>
        body {
            background-color: #c9dbed;
            font-family: Arial, sans-serif;
        }
        table {
            margin: 50px auto;
            width: 75%;
            border-collapse: collapse;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #08a6a8;
            padding: 12px;
        }
        th {
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
        }
        td {
            font-size: 14px;
            color: #333333;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th colspan="2">Заголовок</th>
        </tr>
        <tr>
            <td width="50%" valign="top" align="left">Це текст вирівняний по лівому краю</td>
            <td width="50%" valign="top" align="right">Це текст вирівняний по правому краю</td>
        </tr>
        <tr>
            <td width="25%" bgcolor="#e6f7ff">25% ширини таблиці</td>
            <td width="75%" bgcolor="#fff2e6">75% ширини таблиці</td>
        </tr>
    </table>
</body>
</html>
