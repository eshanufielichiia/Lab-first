<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моє хоббі - React.js CDN</title>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            border-bottom: 3px solid #667eea;
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        .component-wrapper {
            margin: 30px 0;
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .functional-wrapper {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-left: 5px solid #4CAF50;
        }

        .class-wrapper {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            border-left: 5px solid #ff6b6b;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8em;
        }

        p {
            color: #555;
            line-height: 1.6;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .hobby-icon {
            font-size: 2em;
            margin-right: 10px;
            vertical-align: middle;
        }

        .badge {
            display: inline-block;
            background: rgba(0,0,0,0.1);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .component-wrapper {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const HobbyFunctional = () => {
            const hobbies = [
                { icon: "", name: "Архітектура", desc: "Створення нових проєктів" },
                { icon: "", name: "Читання", desc: "Технічна література та наукова фантастика" }
            ];

            return (
                <div className="component-wrapper functional-wrapper">
                    <h2>
                        <span className="hobby-icon"></span>
                        Функціональний компонент
                    </h2>
                    {hobbies.map((hobby, index) => (
                        <div key={index} style={{ marginBottom: '15px' }}>
                            <p>
                                <span style={{ fontSize: '1.5em', marginRight: '10px' }}>{hobby.icon}</span>
                                <strong>{hobby.name}:</strong> {hobby.desc}
                            </p>
                        </div>
                    ))}
                    <div className="badge">
                         React Hooks • JSX • Компонентний підхід
                    </div>
                </div>
            );
        };

        class HobbyClass extends React.Component {
            constructor(props) {
                super(props);
                this.state = {
                    showDetails: false,
                    hobbies: [
                        " 3D моделювання в Blender",
                        " Хендмейд",
                        " Фотографія та відеомонтаж"
                    ]
                };
            }

            toggleDetails = () => {
                this.setState(prevState => ({
                    showDetails: !prevState.showDetails
                }));
            };

            render() {
                return (
                    <div className="component-wrapper class-wrapper">
                        <h2>
                            <span className="hobby-icon"></span>
                            Класовий компонент
                        </h2>
                        <p>
                            <span style={{ fontSize: '1.5em', marginRight: '10px' }}>♟️</span>
                            <strong>Шахи:</strong> Граю в турнірах та аналізую партії гросмейстерів
                        </p>
                        <button 
                            onClick={this.toggleDetails}
                            style={{
                                background: '#ff6b6b',
                                color: 'white',
                                border: 'none',
                                padding: '10px 20px',
                                borderRadius: '25px',
                                cursor: 'pointer',
                                marginTop: '15px',
                                fontSize: '0.9em',
                                transition: 'transform 0.2s'
                            }}
                            onMouseEnter={(e) => e.target.style.transform = 'scale(1.05)'}
                            onMouseLeave={(e) => e.target.style.transform = 'scale(1)'}
                        >
                            {this.state.showDetails ? ' Сховати деталі' : ' Показати більше хоббі'}
                        </button>
                        
                        {this.state.showDetails && (
                            <div style={{ marginTop: '20px', padding: '15px', background: 'rgba(255,255,255,0.5)', borderRadius: '10px' }}>
                                <p><strong>Інші захоплення:</strong></p>
                                <ul style={{ marginLeft: '20px', marginTop: '10px' }}>
                                    {this.state.hobbies.map((hobby, index) => (
                                        <li key={index} style={{ marginBottom: '5px' }}>{hobby}</li>
                                    ))}
                                </ul>
                            </div>
                        )}
                        
                        <div className="badge" style={{ marginTop: '15px' }}>
                            Стан • Життєвий цикл • Події
                        </div>
                    </div>
                );
            }
        }

        const App = () => {
            const currentDate = new Date().toLocaleDateString('uk-UA', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            return (
                <div className="container">
                    <h1>
                         Моє хоббі
                        <div style={{ fontSize: '0.4em', color: '#667eea', marginTop: '5px' }}>
                            {currentDate}
                        </div>
                    </h1>
                    <HobbyFunctional />
                    <HobbyClass />
                    <div style={{ textAlign: 'center', marginTop: '30px', color: '#888', fontSize: '0.9em' }}>
                         React.js додаток | CDN підключення | Класова + Функціональна компонента
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
